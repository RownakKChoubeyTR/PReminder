# ─────────────────────────────────────────────────────────────
# Dependabot — Automated dependency updates
# ─────────────────────────────────────────────────────────────
# Opens PRs weekly for:
#   • npm packages (pnpm)
#   • GitHub Actions (keeps action versions pinned and up to date)
# ─────────────────────────────────────────────────────────────

version: 2

updates:
    # ── npm (pnpm) ─────────────────────────────────────────────
    - package-ecosystem: npm
      directory: /
      schedule:
          interval: weekly
          day: monday
          time: '09:00'
          timezone: UTC
      open-pull-requests-limit: 10
      labels:
          - dependencies
      # Group all minor + patch updates into a single PR per week
      # to reduce noise. Security updates always open individual PRs.
      groups:
          minor-and-patch:
              update-types:
                  - minor
                  - patch
      # Ignore major version bumps — review manually.
      ignore:
          - dependency-name: '*'
            update-types: ['version-update:semver-major']
      commit-message:
          prefix: 'chore(deps)'

    # ── GitHub Actions ──────────────────────────────────────────
    - package-ecosystem: github-actions
      directory: /
      schedule:
          interval: weekly
          day: monday
          time: '09:00'
          timezone: UTC
      open-pull-requests-limit: 5
      labels:
          - dependencies
          - ci
      commit-message:
          prefix: 'chore(ci)'
